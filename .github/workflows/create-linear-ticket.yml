name: Create Linear Security Ticket

on:
  workflow_dispatch:
    inputs:
      severity:
        description: 'Severity level'
        required: true
      finding_summary:
        description: 'Finding summary'
        required: true
      source:
        description: 'Finding source'
        required: true
      port_context:
        description: 'Port context'
        required: true

jobs:
  create-linear-ticket:
    runs-on: ubuntu-latest
    steps:
      - name: Create Linear Issue
        env:
          LINEAR_API_TOKEN: ${{ secrets.LINEAR_API_TOKEN }}
          PORT_CONTEXT: ${{ inputs.port_context }}
          SEVERITY: ${{ inputs.severity }}
          FINDING_SUMMARY: ${{ inputs.finding_summary }}
          SOURCE: ${{ inputs.source }}
        run: |
          python3 << 'EOF'
          import os, json, urllib.request

          token = os.environ['LINEAR_API_TOKEN']
          severity = os.environ['SEVERITY']
          finding = os.environ['FINDING_SUMMARY']
          source = os.environ['SOURCE']

          ctx = json.loads(os.environ['PORT_CONTEXT'])
          entity = ctx.get('entity', {})
          service_name = entity.get('title', entity.get('identifier', 'unknown')) if isinstance(entity, dict) else str(entity)

          title = f"[{service_name}] {severity}: {finding}"
          description = f"**Source:** {source}\n**Severity:** {severity}\n**Service:** {service_name}\n**Finding:** {finding}"

          def gql(query, variables=None):
              payload = json.dumps({"query": query}).encode()
              req = urllib.request.Request(
                  "https://api.linear.app/graphql",
                  data=payload,
                  headers={"Authorization": token, "Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          teams = gql("{ teams { nodes { id name } } }")['data']['teams']['nodes']
          team_id = next((t['id'] for t in teams if 'NFLX' in t['name'] or 'Platform' in t['name']), teams[0]['id'])

          mutation = """
          mutation CreateIssue($title: String!, $teamId: String!, $description: String) {
            issueCreate(input: { title: $title, teamId: $teamId, description: $description }) {
              success
              issue { id title url }
            }
          }
          """
          payload = json.dumps({
              "query": mutation,
              "variables": {"title": title, "teamId": team_id, "description": description}
          }).encode()

          req = urllib.request.Request(
              "https://api.linear.app/graphql",
              data=payload,
              headers={"Authorization": token, "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
              result = json.loads(r.read())
              print(json.dumps(result, indent=2))

          EOF

      - name: Report Success to Port
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ fromJson(inputs.port_context).runId }}
          status: SUCCESS
          summary: Linear ticket created successfully
